<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Eventify</title>
  <script>
    // GitHub Pages SPA fallback:
    // Quando o utilizador visita uma rota diretamente (ex: /Eventify/login),
    // o GitHub Pages não encontra o ficheiro e devolve este 404.html.
    // Guardamos o caminho original e redirecionamos para a raiz,
    // onde o React Router consegue interpretar a rota corretamente.
    sessionStorage.setItem('__redirect', window.location.pathname + window.location.search);
    window.location.replace('/Eventify/');
  </script>
</head>
<body>
</body>
</html>
